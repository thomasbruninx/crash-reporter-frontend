name: frontend-ci

on:
  push:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "middleware.ts"
      - "next.config.ts"
      - "orval.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "middleware.ts"
      - "next.config.ts"
      - "orval.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"

jobs:
  non-docker-build-and-test:
    runs-on: ubuntu-latest
    env:
      BACKEND_API_ORIGIN: http://backend:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build frontend (non-Docker)
        run: npm run build
      - name: Run tests
        run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    env:
      BACKEND_API_ORIGIN: http://backend:8000
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        run: docker build --build-arg BACKEND_API_ORIGIN="${BACKEND_API_ORIGIN}" -t crash-reporter-frontend:ci .
